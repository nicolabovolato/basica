name: Setup pnpm
description: setup pnpm
inputs:
  node-version:
    description: "node version"
    required: true
    default: 24
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v7
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
    - run: pnpm install --frozen-lockfile
      shell: bash
